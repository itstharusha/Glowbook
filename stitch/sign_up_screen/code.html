<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed-dim": "#62de86",
              "on-secondary-container": "#730129",
              "on-primary": "#ffffff",
              "on-primary-fixed": "#400013",
              "on-error-container": "#93000a",
              "surface-tint": "#bd0047",
              "secondary-fixed-dim": "#ffb2bc",
              "on-primary-container": "#fffbff",
              "primary": "#b80046",
              "inverse-surface": "#2e3034",
              "secondary": "#aa314e",
              "error-container": "#ffdad6",
              "on-surface-variant": "#5c3f43",
              "background": "#f9f9fe",
              "tertiary": "#006b32",
              "on-tertiary": "#ffffff",
              "on-surface": "#1a1c1f",
              "on-secondary-fixed": "#400013",
              "tertiary-container": "#008741",
              "surface-container": "#ededf2",
              "surface-variant": "#e2e2e7",
              "on-tertiary-fixed": "#00210b",
              "surface-container-lowest": "#ffffff",
              "surface-container-highest": "#e2e2e7",
              "inverse-primary": "#ffb2bc",
              "primary-container": "#e40e5a",
              "inverse-on-surface": "#f0f0f5",
              "on-background": "#1a1c1f",
              "on-secondary-fixed-variant": "#891737",
              "on-tertiary-fixed-variant": "#005226",
              "secondary-container": "#ff728d",
              "primary-fixed-dim": "#ffb2bc",
              "surface-bright": "#f9f9fe",
              "surface": "#f9f9fe",
              "primary-fixed": "#ffd9dd",
              "tertiary-fixed": "#7ffba0",
              "outline-variant": "#e5bdc1",
              "outline": "#906e72",
              "surface-container-low": "#f3f3f8",
              "secondary-fixed": "#ffd9dd",
              "on-error": "#ffffff",
              "on-primary-fixed-variant": "#910035",
              "surface-container-high": "#e8e8ed",
              "surface-dim": "#d9dade",
              "on-secondary": "#ffffff",
              "on-tertiary-container": "#f7fff3",
              "error": "#ba1a1a"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .inset-grouped-table {
            border-radius: 10px;
            overflow: hidden;
        }
        .ios-cell {
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            background: #ffffff;
        }
        .ios-cell:not(:last-child) {
            position: relative;
        }
        .ios-cell:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            left: 16px;
            height: 0.5px;
            background-color: #E2E2E7;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-low font-body text-on-surface antialiased">
<!-- Top Navigation Bar -->
<nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl flex items-center justify-between px-4 py-3 h-[44px]">
<div class="flex items-center w-1/4">
<button class="flex items-center text-primary active:opacity-50 transition-opacity">
<span class="material-symbols-outlined text-[24px]">chevron_left</span>
</button>
</div>
<h1 class="w-2/4 text-center text-[17px] font-semibold tracking-tight">Sign Up</h1>
<div class="w-1/4"></div>
</nav>
<!-- Content Area -->
<main class="pt-[64px] pb-12 px-4 max-w-md mx-auto">
<!-- Header Section -->
<div class="mb-8 mt-4 text-center">
<h2 class="text-[34px] font-bold tracking-tight text-on-background">Create Account</h2>
<p class="text-[17px] text-on-surface-variant/80 mt-1">Join GlowBook for luxury wellness</p>
</div>
<form>
<!-- SECTION 1: YOUR INFORMATION -->
<div class="mb-6">
<p class="px-4 pb-2 text-[13px] uppercase tracking-wider text-on-surface-variant/70 font-medium">YOUR INFORMATION</p>
<div class="inset-grouped-table bg-white">
<div class="ios-cell">
<label class="text-[17px] w-24">Name</label>
<input class="flex-1 text-right bg-transparent border-none focus:ring-0 text-[17px] text-on-surface-variant placeholder:text-on-surface-variant/40" placeholder="Required" type="text"/>
</div>
<div class="ios-cell">
<label class="text-[17px] w-24">Email</label>
<input class="flex-1 text-right bg-transparent border-none focus:ring-0 text-[17px] text-on-surface-variant placeholder:text-on-surface-variant/40" placeholder="example@me.com" type="email"/>
</div>
<div class="ios-cell">
<label class="text-[17px] w-24">Phone</label>
<input class="flex-1 text-right bg-transparent border-none focus:ring-0 text-[17px] text-on-surface-variant placeholder:text-on-surface-variant/40" placeholder="(555) 000-0000" type="tel"/>
</div>
</div>
</div>
<!-- SECTION 2: PASSWORD -->
<div class="mb-8">
<p class="px-4 pb-2 text-[13px] uppercase tracking-wider text-on-surface-variant/70 font-medium">PASSWORD</p>
<div class="inset-grouped-table bg-white">
<div class="ios-cell flex justify-between">
<label class="text-[17px] w-32">Password</label>
<div class="flex items-center flex-1">
<input class="flex-1 text-right bg-transparent border-none focus:ring-0 text-[17px] text-on-surface-variant placeholder:text-on-surface-variant/40" placeholder="Required" type="password"/>
<button class="ml-2 text-primary text-[13px] font-medium uppercase tracking-tighter" type="button">Show</button>
</div>
</div>
<div class="ios-cell">
<label class="text-[17px] w-40">Confirm</label>
<input class="flex-1 text-right bg-transparent border-none focus:ring-0 text-[17px] text-on-surface-variant placeholder:text-on-surface-variant/40" placeholder="Verify" type="password"/>
</div>
</div>
</div>
<!-- CTA SECTION -->
<div class="space-y-3">
<!-- Primary Action -->
<button class="w-full h-[50px] bg-gradient-to-r from-primary to-primary-container text-white rounded-xl text-[17px] font-semibold active:scale-[0.98] transition-all shadow-lg shadow-primary/20" type="submit">
                    Create Account
                </button>
<!-- SSO Options -->
<div class="flex items-center py-2">
<div class="flex-1 h-[0.5px] bg-outline-variant"></div>
<span class="px-4 text-[12px] text-on-surface-variant/60 font-medium uppercase">or</span>
<div class="flex-1 h-[0.5px] bg-outline-variant"></div>
</div>
<button class="w-full h-[50px] bg-black text-white rounded-xl flex items-center justify-center space-x-2 active:scale-[0.98] transition-all" type="button">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="text-[17px] font-semibold">Sign in with Apple</span>
</button>
<button class="w-full h-[50px] bg-white border border-outline-variant text-on-surface rounded-xl flex items-center justify-center space-x-2 active:scale-[0.98] transition-all" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-[17px] font-semibold">Continue with Google</span>
</button>
</div>
<!-- FOOTNOTE -->
<div class="mt-8 text-center px-6">
<p class="text-[13px] text-on-surface-variant/70 leading-relaxed">
                    By continuing, you agree to GlowBook's 
                    <a class="text-primary font-medium" href="#">Terms of Service</a> and 
                    <a class="text-primary font-medium" href="#">Privacy Policy</a>.
                </p>
</div>
</form>
</main>
<!-- Glass Overlay for aesthetic depth -->
<div class="fixed bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-background to-transparent pointer-events-none z-0"></div>
</body></html>
