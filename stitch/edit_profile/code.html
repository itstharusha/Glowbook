<body class="bg-surface text-on-surface antialiased">
<!-- Top Navigation Bar -->
<nav class="fixed top-0 w-full z-50 bg-white/80 dark:bg-black/80 backdrop-blur-xl border-none shadow-sm dark:shadow-none">
<div class="flex items-center justify-between px-6 py-4 w-full">
<button class="text-primary font-medium hover:opacity-70 transition-opacity active:scale-95 transition-transform">

            </button>
<h1 class="text-[#FF2D6B] font-bold text-lg tracking-tight">Edit Profile</h1>
<button class="text-primary font-bold hover:opacity-70 transition-opacity active:scale-95 transition-transform">
                Save
            </button>
</div>
</nav>
<main class="pt-24 pb-12 max-w-2xl mx-auto">
<!-- Header Section: Avatar -->
<div class="flex flex-col items-center mb-10">
<div class="relative group">
<div class="w-20 h-20 rounded-full overflow-hidden bg-surface-container-highest ring-4 ring-surface-container-low shadow-lg">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Professional woman portrait for user avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBVG1JkCvs9cdTCbGJljs04d0wI8Dpm4p5E2Bw4nJLb8-6z9AQk5ZymVBgBojnvQmUx7297S4ZStkgqzmDJPDxK4gpRIVKWK5lFsmwa7TsBGAwVXHx6XbDCgokf7C2IZ7XUJQhE5Q51dxkjAHrvyBSuH9NhZPzUsTFxchavwlmPagtvQdDTPQokdBgqvKijlmTc8tHK8Zf-RpkmJfzAWnGjV6J8NGXiOKmE3qi9QDPperblW1eD4NCxAAVHIG8BfFDs97-XLfdjJxP3"/>
</div>
<div class="absolute inset-0 flex items-center justify-center bg-black/20 rounded-full opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
<span class="material-symbols-outlined text-white text-xl">camera_alt</span>
</div>
</div>
<button class="mt-3 text-primary font-semibold text-sm tracking-wide hover:opacity-80 active:scale-95 transition-all">
                Edit
            </button>
</div>
<!-- Form Sections -->
<div class="space-y-8">
<!-- NAME Section -->
<section class="ios-inset-group">
<h2 class="px-4 mb-2 text-xs font-bold tracking-widest text-outline uppercase">NAME</h2>
<div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm">
<div class="px-4 py-4 flex items-center border-b border-surface-variant/30">
<label class="w-28 text-sm font-semibold text-on-surface-variant">First</label>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-[17px] p-0 text-on-surface" type="text" value="Sophia"/>
</div>
<div class="px-4 py-4 flex items-center">
<label class="w-28 text-sm font-semibold text-on-surface-variant">Last</label>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-[17px] p-0 text-on-surface" type="text" value="Anderson"/>
</div>
</div>
</section>
<!-- CONTACT Section -->
<section class="ios-inset-group">
<h2 class="px-4 mb-2 text-xs font-bold tracking-widest text-outline uppercase">CONTACT</h2>
<div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm">
<div class="px-4 py-4 flex items-center border-b border-surface-variant/30">
<label class="w-28 text-sm font-semibold text-on-surface-variant">Email</label>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-[17px] p-0 text-on-surface" type="email" value="sophia.a@glowmail.com"/>
</div>
<div class="px-4 py-4 flex items-center">
<label class="w-28 text-sm font-semibold text-on-surface-variant">Phone</label>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-[17px] p-0 text-on-surface" type="tel" value="+1 (555) 0123-4567"/>
</div>
</div>
</section>
<!-- PASSWORD Section -->
<section class="ios-inset-group">
<h2 class="px-4 mb-2 text-xs font-bold tracking-widest text-outline uppercase">PASSWORD</h2>
<div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm">
<button class="w-full px-4 py-4 flex items-center justify-between hover:bg-surface-container-low transition-colors group">
<span class="text-[17px] text-on-surface">Change Password</span>
<div class="flex items-center text-outline-variant group-active:text-primary">
<span class="material-symbols-outlined text-[20px]">chevron_right</span>
</div>
</button>
</div>
</section>
<!-- Additional Options (Log Out / Delete) -->
<section class="ios-inset-group pt-4">
<div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm">
<button class="w-full px-4 py-4 flex items-center justify-center hover:bg-error-container/10 transition-colors active:scale-[0.98]">
<span class="text-[17px] font-semibold text-error">Log Out</span>
</button>
</div>
<p class="mt-4 px-4 text-center text-xs text-outline leading-relaxed">
                    Personalized data is used to improve your GlowBook experience. 
                    <a class="text-primary font-medium" href="#">Learn more...</a>
</p>
</section>
