<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In - GlowBook</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "secondary-fixed-dim": "#ffb2bc",
                        "surface-container-low": "#f3f3f8",
                        "on-surface-variant": "#5c3f43",
                        "on-primary-container": "#fffbff",
                        "secondary-fixed": "#ffd9dd",
                        "surface-variant": "#e2e2e7",
                        "outline-variant": "#e5bdc1",
                        "inverse-surface": "#2e3034",
                        "inverse-primary": "#ffb2bc",
                        "secondary": "#aa314e",
                        "surface-bright": "#f9f9fe",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#ffd9dd",

                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#f0f0f5",

                        "body": ["Inter"],

<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col justify-center items-center p-4">
<!-- Minimal Header for Focused View -->
<header class="w-full max-w-[480px] flex items-center p-4 fixed top-0 left-0 right-0 z-50 bg-surface/80 backdrop-blur-md">
<button aria-label="Go back" class="flex items-center justify-center w-12 h-12 text-on-surface">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="text-[17px] font-semibold flex-1 text-center pr-12">Sign In</h1>
</header>
<main class="w-full max-w-[480px] flex flex-col mt-20 pb-8 px-4 gap-8">
<div class="text-center space-y-2">
<h2 class="text-[34px] font-bold leading-tight tracking-tight text-on-surface">Welcome Back</h2>
<p class="text-[17px] text-on-surface-variant">Sign in to book your next appointment.</p>
</div>
<form class="space-y-4">
<!-- Inset Grouped Form Style -->
<div class="bg-surface-container-lowest rounded-[14px] p-4 space-y-4">
<label class="block">
<span class="block text-[13px] font-medium text-on-surface-variant/60 mb-1">Email</span>
<input class="w-full bg-surface-container-low border-0 rounded-lg h-14 px-4 text-[17px] text-on-surface placeholder:text-on-surface-variant/40 focus:ring-0" placeholder="Enter your email" type="email"/>
</label>
<label class="block">
<span class="block text-[13px] font-medium text-on-surface-variant/60 mb-1">Password</span>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 rounded-lg h-14 pl-4 pr-12 text-[17px] text-on-surface placeholder:text-on-surface-variant/40 focus:ring-0" placeholder="Enter your password" type="password"/>
<button class="absolute right-0 top-0 h-14 w-12 flex items-center justify-center text-on-surface-variant" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</label>
<div class="flex justify-end pt-2">
<a class="text-[13px] font-medium text-primary" href="#">Forgot Password?</a>
</div>
</div>
<div class="pt-4 space-y-3">
<button class="w-full h-14 rounded-[12px] bg-gradient-to-r from-primary to-primary-container text-on-primary text-[17px] font-semibold flex items-center justify-center shadow-[0_10px_30px_rgba(255,45,107,0.15)]" type="submit">
                    Sign In
                </button>
<button class="w-full h-14 rounded-[12px] bg-surface-container-highest text-on-surface text-[17px] font-semibold flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">ios</span>
                    Sign in with Apple
                </button>
<button class="w-full h-14 rounded-[12px] bg-surface-container-highest text-on-surface text-[17px] font-semibold flex items-center justify-center gap-2" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Continue with Google
                </button>
</div>
</form>
<p class="text-center text-[15px] text-on-surface-variant mt-4">
            Don't have an account? <a class="font-semibold text-primary" href="#">Sign Up</a>
</p>
</main>
</body></html>
