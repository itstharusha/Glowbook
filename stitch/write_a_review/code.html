<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .filled-star {
            font-variation-settings: 'FILL' 1;
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-background font-body text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 glass-header">
<div class="flex items-center justify-between px-6 py-4 w-full max-w-2xl mx-auto">
<button class="text-primary font-semibold hover:opacity-70 transition-opacity">
                Cancel
            </button>
<h1 class="text-on-surface font-headline font-bold text-lg tracking-tight">
                Write a Review
            </h1>
<button class="text-primary/40 font-bold cursor-not-allowed" disabled="">
                Submit
            </button>
</div>
</header>
<main class="flex-1 w-full max-w-2xl mx-auto pt-20 px-6 pb-12">
<!-- Salon Context Cell (Header) -->
<section class="bg-surface-container-lowest rounded-xl p-4 flex items-center space-x-4 mb-8">
<div class="w-10 h-10 rounded-full overflow-hidden flex-shrink-0">
<img alt="Salon Portrait" class="w-full h-full object-cover" data-alt="Interior of a luxury modern hair salon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAsr6LBJwiWUvEFxju6rCicKesB6UG7cXvvRwg6VMSFgpMl49DJChHK-yQDtJK0dOg04foU5qmR79aZ-kX6K7dRwnfhxIAPsgwo0SRnC5edRFc3oNAIjqafo90PkEBSSU1qXmDEVuElM3cLOotG8SjydkHSSMxx2AhQZZDpwuqsqYIjk3IniUOVal4MoEUAAs3CgdQSRqJzsA4CnJysnC-am2yOgFaN2rHj9tGt7bjX4V808SMG3Ltm4BZ22w4pBbblTn9G1fCBVxVg"/>
</div>
<div class="flex flex-col">
<h2 class="font-headline font-bold text-on-surface leading-tight">Luxe Glow Studio</h2>
<p class="text-on-surface-variant text-sm">HydraFacial &amp; Scalp Massage</p>
</div>
</section>
<!-- Rating Section -->
<section class="flex flex-col items-center justify-center space-y-4 py-8">
<h3 class="font-headline font-semibold text-xl text-on-surface">How was your visit?</h3>
<div class="flex items-center justify-center gap-2">
<!-- Large Stars -->
<span class="material-symbols-outlined text-primary text-[44px] cursor-pointer" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-primary text-[44px] cursor-pointer" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-primary text-[44px] cursor-pointer" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-primary text-[44px] cursor-pointer" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-primary text-[44px] cursor-pointer" data-icon="star" style="font-variation-settings: 'FILL' 0;">star</span>
</div>
<p class="text-secondary font-medium text-sm">Great</p>
</section>
<!-- Review Input Section -->
<section class="mt-4">
<div class="bg-surface-container-low rounded-xl overflow-hidden focus-within:ring-2 ring-primary/20 transition-all">
<textarea class="w-full h-[120px] bg-transparent border-none focus:ring-0 p-4 text-on-surface placeholder:text-on-surface-variant/50 resize-none font-body text-base" placeholder="Share your experience..."></textarea>
<div class="px-4 pb-3 flex justify-end">
<span class="text-on-surface-variant/60 text-[13px] font-medium tracking-tight">0 / 500</span>
</div>
</div>
<p class="mt-4 px-2 text-on-surface-variant/70 text-xs leading-relaxed italic">
                Your review will be shared publicly on GlowBook to help others discover amazing services.
            </p>
</section>
<!-- Image Upload (Visual Supplement) -->
<section class="mt-10">
<h4 class="font-headline font-semibold text-sm mb-4 uppercase tracking-widest text-on-surface-variant">Add Photos</h4>
<div class="grid grid-cols-4 gap-3">
<button class="aspect-square bg-surface-container-high rounded-lg flex flex-col items-center justify-center border-2 border-dashed border-outline-variant/30 hover:border-primary/30 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="add_a_photo">add_a_photo</span>
</button>
<!-- Placeholder photo slot -->
<div class="aspect-square bg-surface-container-high rounded-lg"></div>
<div class="aspect-square bg-surface-container-high rounded-lg"></div>
<div class="aspect-square bg-surface-container-high rounded-lg"></div>
</div>
</section>
</main>
<!-- Bottom Action Sheet (Contextual Footer) -->
<footer class="mt-auto p-6 flex flex-col items-center">
<div class="w-12 h-1 bg-surface-container-highest rounded-full mb-6"></div>
<p class="text-center text-sm text-on-surface-variant max-w-xs">
            Reviewing as <span class="text-on-surface font-semibold">Sophia Martinez</span>
</p>
</footer>
</body></html>
